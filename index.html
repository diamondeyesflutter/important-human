<!DOCTYPE html>
<html>
  <head>
    <title>ui gabut</title>
    <style>
      body {
        font-family: 'Courier New', monospace;
        text-align: center;
        background: linear-gradient(green, yellowgreen, green);
        height: 100vh;
      }
      .container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 20px;
        height: 100vh;
      }
      .box {
        width: 200px;
        border: 2px solid green;
        border-radius: 30%;
        box-shadow: 0 0 10px yellow;
        transition: 0.3s;
        animation: glow 1s infinite alternate;
      }
      .box:hover {
        transition: 0.3s;
        transform: rotateY(45deg);
      }
      @keyframes glow {
        0% {
          box-shadow: none;
        }
        50% {
          box-shadow: 0 0 10px yellow;
        }
        75% {
          box-shadow: none;
        }
        100% {
          box-shadow: 0 0 10px yellow;
        }
      }
      h1 {
        color: green;
        text-shadow: 0 0 10px yellow;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Hello there, i want you to take a look for my best human i've ever meet in this world</h1>
      <div class="box">
        <h1>Fathul Khair(me)</h1>
      </div>
      <div class="box">
        <h1> Azka(my gf)</h1>
      </div>
      <div class="box">
        <h1>Akram(my lil bro)</h1>
      </div>
    </div>
  </body>
</html>
